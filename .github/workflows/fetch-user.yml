name: Fetch Hive Stats

on:
  schedule:
    - cron: "*/1 * * * *"   # every minute
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Read queue
      id: queue
      run: |
        if [ ! -f queue.json ]; then echo "[]" > queue.json; fi
        echo "QUEUE=$(cat queue.json)" >> $GITHUB_ENV

    - name: Process queue
      run: |
        mkdir -p data
        USERS=$(jq -r '.[]' queue.json)

        for USER in $USERS; do
          echo "Fetching $USER"
          curl -s "https://api.playhive.com/v0/game/all/all/$USER" > data/$USER.json
        done

    - name: Clear queue
      run: |
        echo "[]" > queue.json

    - name: Commit results
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add data/*.json queue.json
        git commit -m "Updated stats" || echo "No changes"
        git push
